<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Admin CMS | Pirauna Sistemas</title>
  <meta name="robots" content="noindex,nofollow">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;700;800&family=Sora:wght@600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="admin.css">
</head>
<body>
  <main class="admin-wrap">
    <section class="admin-card">
      <header class="admin-brandbar">
        <a class="brand" href="/" aria-label="Abrir site da Pirauna Sistemas">
          <img src="assets/images/logo-pirauna.jpg" alt="Logo da Pirauna Sistemas" width="48" height="48">
          <span class="brand-text">
            <strong>Pirauna Sistemas</strong>
            <small>Painel administrativo</small>
          </span>
        </a>
        <a class="admin-link-site" href="/" target="_blank" rel="noopener">Ver site</a>
      </header>

      <header class="admin-head">
        <h1>Painel de Conteudo</h1>
        <p>Edite textos, contato e links sem tocar no codigo.</p>
      </header>

      <div id="cms-not-configured" class="admin-alert is-hidden">
        <strong>CMS nao configurado.</strong>
        <p>Preencha `cms-config.js` com `supabaseUrl` e `supabaseAnonKey`.</p>
      </div>

      <form id="admin-login-form" class="admin-login">
        <div class="admin-login-field">
          <label for="admin-email">Email</label>
          <input id="admin-email" type="email" required placeholder="seu-email@empresa.com">
        </div>

        <div class="admin-login-field">
          <label for="admin-password">Senha</label>
          <input id="admin-password" type="password" required placeholder="Sua senha">
        </div>

        <button class="admin-login-submit" type="submit">Entrar no painel</button>
      </form>

      <section id="admin-editor" class="admin-editor is-hidden">
        <div class="admin-toolbar">
          <div>
            <strong>Sessao ativa:</strong>
            <span id="admin-user">-</span>
          </div>
          <div class="admin-actions">
            <button type="button" id="admin-save">Salvar alteracoes</button>
            <button type="button" id="admin-logout" class="ghost">Sair</button>
          </div>
        </div>

        <div id="admin-status" class="admin-status"></div>
        <div id="admin-fields" class="admin-fields"></div>
      </section>
    </section>
  </main>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="cms-config.js"></script>
  <script src="cms.js"></script>
  <script src="admin.js"></script>
</body>
</html>
